<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Transactions</title>
    <link rel="stylesheet" href="styles/global-styles/general.css" />
    <link rel="stylesheet" href="styles/transactions/transaction.css" />
    <script
      defer
      type="module"
      src="src/controllers/transactionController.js"
    ></script>
  </head>
  <body>
    <div class="mobile-container">
      <header class="header">
        <h2>Transactions</h2>
        <span class="download">Download</span>
      </header>

      <section class="balance-card">
        <div class="flex_hor">
          <div class="transaction_period">
            <p>Jun 2026</p>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#f8fafc"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-chevron-down-icon lucide-chevron-down"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
          <div class="analysis">
            <p>Analysis</p>
          </div>
        </div>
        <div class="in_out_con">
          <p><span class="in_out">In:</span> <span class="in"></span></p>
          <p><span class="in_out">Out:</span> <span class="out"></span></p>
        </div>
      </section>

      <div class="filter-box">
        <div class="filter_drop_down">
          <div class="categories">
            <p>All Categories</p>
            <svg
              class="cate_dropdown"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#f8fafc"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-chevron-down-icon lucide-chevron-down"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
          <div class="categories">
            <p>All Status</p>
            <svg
              class="status_dropdown"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#f8fafc"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-chevron-down-icon lucide-chevron-down"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
        </div>
        <div class="filter_categories">
          <div class="cate">
            <p>All Categories</p>
          </div>
        </div>
      </div>

      <section class="transactions">
        <div class="transaction-item">
          <div class="icon debit">↑</div>
          <div class="details">
            <p class="naration">Transfer to John</p>
            <p class="transaction_time">Today, 10:35 AM</p>
          </div>
          <div class="amount negative">
            <p>-₦15,000</p>
            <div class="status_label">
              <p class="status">successful</p>
            </div>
          </div>
        </div>

        <div class="transaction-item">
          <div class="icon credit">↓</div>
          <div class="details">
            <p class="naration">Credit from Emmy</p>
            <p class="transaction_time">Today, 10:35 AM</p>
          </div>
          <div class="amount positive">
            <p>+₦15,000</p>
            <div class="status_label">
              <p class="status">successful</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
